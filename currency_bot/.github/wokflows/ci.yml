name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:

  # JOB 1: собираем и проверяем компиляцию
  build:
    name: Build & Compile Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git ca-certificates \
            libboost-system-dev libssl-dev libcurl4-openssl-dev \
            nlohmann-json3-dev zlib1g-dev

      # Кэшируем скомпилированный tgbot-cpp между билдами
      - name: Cache tgbot-cpp
        id: cache-tgbot
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/libTgBot.*
          key: tgbot-cpp-v1-${{ runner.os }}

      - name: Build and install tgbot-cpp
        if: steps.cache-tgbot.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/reo7sp/tgbot-cpp.git
          cd tgbot-cpp
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel "$(nproc)"
          sudo cmake --install build

      - name: Configure project
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: cmake --build build --parallel "$(nproc)"

      - name: Verify binary
        run: |
          ls -la build/currency_bot
          file build/currency_bot

  # JOB 2: собираем Docker-образ и пушим в ghcr.io
  docker:
    name: Build & Push Docker image
    needs: build                                   # запускается только если build прошёл
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Генерируем теги образа: latest и short SHA коммита.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max